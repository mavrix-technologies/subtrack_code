name: Android Play Store Build

on:
  workflow_dispatch:

concurrency:
  group: android-playstore-build
  cancel-in-progress: false

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Missing EXPO_TOKEN. Create an Expo access token, then add it as a GitHub repository secret named EXPO_TOKEN."
            echo "::error::GitHub path: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build production AAB locally
        run: |
          mkdir -p artifacts
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output ./artifacts/subtrack-playstore-${{ github.run_number }}.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtrack-playstore-aab
          path: artifacts/*.aab
          if-no-files-found: error
