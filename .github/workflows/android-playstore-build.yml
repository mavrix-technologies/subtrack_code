name: Android Play Store Build

on:
  workflow_dispatch:

concurrency:
  group: android-playstore-build
  cancel-in-progress: false

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Resolve Expo token
        env:
          EXPO_TOKEN_SECRET: ${{ secrets.EXPO_TOKEN }}
          SUBTRACK_SECRET: ${{ secrets.SUBTRACK }}
        run: |
          if [ -n "$EXPO_TOKEN_SECRET" ]; then
            echo "EXPO_TOKEN=$EXPO_TOKEN_SECRET" >> "$GITHUB_ENV"
          elif [ -n "$SUBTRACK_SECRET" ]; then
            echo "EXPO_TOKEN=$SUBTRACK_SECRET" >> "$GITHUB_ENV"
          else
            echo "::error::Missing Expo token. Create an Expo access token, then add it as a GitHub repository secret named EXPO_TOKEN."
            echo "::error::This workflow also accepts an existing repository secret named SUBTRACK as a fallback."
            echo "::error::GitHub path: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.13.0
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production AAB locally
        run: |
          mkdir -p artifacts
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output ./artifacts/subtrack-playstore-${{ github.run_number }}.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtrack-playstore-aab
          path: artifacts/*.aab
          if-no-files-found: error
