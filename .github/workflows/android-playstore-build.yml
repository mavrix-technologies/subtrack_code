name: Android Play Store Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: android-playstore-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build production Android AAB on EAS
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      CI: 1
      NODE_ENV: production
      EXPO_NO_TELEMETRY: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Check Expo token
        env:
          EXPO_TOKEN_SECRET: ${{ secrets.EXPO_TOKEN }}
          SUBTRACK_SECRET: ${{ secrets.SUBTRACK }}
        run: |
          if [ -z "$EXPO_TOKEN_SECRET" ] && [ -z "$SUBTRACK_SECRET" ]; then
            echo "::error::Missing Expo token. Create an Expo access token, then add it as a GitHub repository secret named EXPO_TOKEN."
            exit 1
          fi

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: 18.13.0
          packager: npm
          token: ${{ secrets.EXPO_TOKEN || secrets.SUBTRACK }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Verify EAS auth
        run: eas whoami

      - name: Build production Android AAB
        run: eas build --platform android --profile production --non-interactive --wait
