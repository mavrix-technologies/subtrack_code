name: iOS IPA Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: iOS IPA Build
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          if [ -d /Applications/Xcode_16.4.app/Contents/Developer ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          else
            echo "Xcode 16.4 not found; using the runner default Xcode"
          fi
          xcodebuild -version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fix expo-notifications for SDK compatibility
        run: |
          FILE="node_modules/expo-notifications/ios/ExpoNotifications/Notifications/DateComponentsSerializer.swift"
          if [ ! -f "$FILE" ]; then
            echo "expo-notifications patch skipped: $FILE not found"
          else
            PATCH_FILE="$FILE" python3 -c '
            import os, pathlib, re

            f = pathlib.Path(os.environ["PATCH_FILE"])
            text = f.read_text()
            patched = re.sub(
                r"\s*if #available\(iOS 26\.0, \*\) \{\s*serializedComponents\[\"isRepeatedDay\"\] = dateComponents\.isRepeatedDay \?\? false\s*\}\s*",
                "\n    serializedComponents[\"isRepeatedDay\"] = false\n",
                text,
            )
            if patched != text:
                f.write_text(patched)
                print("Patched DateComponentsSerializer.swift")
            else:
                print("DateComponentsSerializer.swift - no patch needed")
            '
          fi

      - name: Remove expo-dev-client before prebuild
        run: |
          npm uninstall --no-save expo-dev-client
          rm -rf node_modules/expo-dev-launcher node_modules/expo-dev-menu node_modules/expo-dev-client

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          set -o pipefail
          pod install --repo-update 2>&1 | tee pod-install.log || \
          (
            echo "=== POD INSTALL FAILED - ERRORS FROM RAW LOG ==="
            grep -E "error:|Error|ERROR|failed|Failed|Unable|undefined method" pod-install.log | head -80 || true
            echo ""
            echo "=== LAST 120 LINES ==="
            tail -120 pod-install.log
            exit 1
          )

      - name: Build iOS app without code signing
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace SubTrack.xcworkspace \
            -scheme SubTrack \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            IBTOOL_WARNINGS_AS_ERRORS=NO \
            build \
            2>&1 | tee build.log | xcpretty --color --simple || \
            (
              echo "=== BUILD FAILED - ERRORS FROM RAW LOG ==="
              grep -E "error:|warning: .*(error|failed)" build.log | head -60 || true
              echo ""
              echo "=== STORYBOARD / IBTOOL ERRORS ==="
              grep -i "ibtool\|storyboard\|CompileStoryboard" build.log | head -40 || true
              echo ""
              echo "=== LAST 80 LINES ==="
              tail -80 build.log
              exit 1
            )

      - name: Create Payload directory
        working-directory: ios/build/Build/Products/Release-iphoneos
        run: mkdir Payload

      - name: Move app to Payload
        working-directory: ios/build/Build/Products/Release-iphoneos
        run: mv SubTrack.app Payload/

      - name: Zip IPA
        working-directory: ios/build/Build/Products/Release-iphoneos
        run: zip -qq -r -9 SubTrack.ipa Payload

      - name: Copy IPA for upload
        run: |
          cp ios/build/Build/Products/Release-iphoneos/SubTrack.ipa ./SubTrack.ipa
          ls -lh SubTrack.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubTrack-iOS-IPA
          path: ./SubTrack.ipa
          compression-level: 0

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-failure-logs
          path: |
            ios/pod-install.log
            ios/build.log
          if-no-files-found: warn

      - name: Create release and upload IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v${{ github.run_number }}
          name: iOS Build v${{ github.run_number }}
          body: |
            iOS IPA Build - unsigned, no code signing.

            Build number: ${{ github.run_number }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          files: ./SubTrack.ipa
