name: iOS IPA Build (Unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build (No Code Signing)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile for XCode compatibility (if needed)
        run: |
          cd ios
          # Check XCode version
          xcodebuild -version
          # Remove strict XCode version check if present
          if grep -q "React Native requires XCode" Podfile; then
            echo "Patching Podfile to remove XCode version requirement..."
            sed -i.bak '/React Native requires XCode/,/raise.*XCode/d' Podfile
            echo "Podfile patched successfully"
          else
            echo "No XCode version check found in Podfile"
          fi
          # Fix RNFBApp non-modular header error (Firebase + React Native in CI)
          if ! grep -q "ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES" Podfile; then
            echo "Patching Podfile to fix RNFBApp non-modular header error..."
            cat >> Podfile << 'EOF'

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
      config.build_settings['CLANG_ENABLE_MODULE_DEBUGGING'] = 'NO'
    end
  end
end
EOF
            echo "Podfile patched for RNFBApp"
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build iOS app (no codesign)
        run: |
          cd ios
          xcodebuild -workspace SubTrack.xcworkspace \
            -scheme SubTrack \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            build

      - name: Create IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r SubTrack.app Payload/
          zip -qq -r -9 SubTrack.ipa Payload
          cp SubTrack.ipa ${{ github.workspace }}/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubTrack-iOS-IPA-Unsigned
          path: SubTrack.ipa
          compression-level: 0
          retention-days: 14

      - name: Create Release and Upload IPA
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ios-v${{ github.run_number }}
          name: iOS Build v${{ github.run_number }} (Unsigned)
          body: |
            iOS IPA Build - Unsigned (No Code Signing)
            
            ⚠️ This IPA is NOT signed and cannot be installed directly on un-jailbroken devices without Sideloadly/AltStore.
            Built automatically without any Apple Developer Account.
            
            **Build Details:**
            - Build Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          files: SubTrack.ipa
