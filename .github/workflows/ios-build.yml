name: iOS IPA Build (Unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build (No Code Signing)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile and Xcode Project for Unsigned Build
        run: |
          node -e '
          const fs = require("fs");
          
          // 1. Patch Podfile
          const podfile = "ios/Podfile";
          if (fs.existsSync(podfile)) {
            let content = fs.readFileSync(podfile, "utf8");
            const patch = `
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings["CODE_SIGNING_ALLOWED"] = "YES"
                config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"
                config.build_settings["CODE_SIGN_IDENTITY"] = "-"
                config.build_settings["EXPANDED_CODE_SIGN_IDENTITY"] = "-"
                config.build_settings["DEVELOPMENT_TEAM"] = ""
                config.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ""
              end
            end
            `;
            if (content.includes("post_install do |installer|")) {
              content = content.replace("post_install do |installer|", "post_install do |installer|\n" + patch);
            } else {
              content += "\npost_install do |installer|\n" + patch + "\nend\n";
            }
            fs.writeFileSync(podfile, content);
            console.log("Successfully patched ios/Podfile");
          }

          // 2. Patch Xcode Project
          const pbxproj = "ios/SubTrack.xcodeproj/project.pbxproj";
          if (fs.existsSync(pbxproj)) {
            let content = fs.readFileSync(pbxproj, "utf8");
            content = content.replace(/CODE_SIGN_STYLE = Automatic;/g, "CODE_SIGN_STYLE = Manual;");
            content = content.replace(/CODE_SIGN_IDENTITY = "([^"]*)";/g, "CODE_SIGN_IDENTITY = \"-\";");
            content = content.replace(/CODE_SIGN_IDENTITY = "";/g, "CODE_SIGN_IDENTITY = \"-\";");
            content = content.replace(/DEVELOPMENT_TEAM = [^;]*;/g, "DEVELOPMENT_TEAM = \"\";");
            content = content.replace(/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/g, "PROVISIONING_PROFILE_SPECIFIER = \"\";");
            
            if (!content.includes("AD_HOC_CODE_SIGNING_ALLOWED")) {
              content = content.replace(/buildSettings = \{/g, "buildSettings = {\n\t\t\t\tAD_HOC_CODE_SIGNING_ALLOWED = YES;\n\t\t\t\tCODE_SIGNING_ALLOWED = YES;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;");
            }
            
            fs.writeFileSync(pbxproj, content);
            console.log("Successfully patched ios/SubTrack.xcodeproj/project.pbxproj");
          }
          '

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Patch Framework Signing Scripts
        run: |
          find ios/Pods/Target\ Support\ Files -name "*-frameworks.sh" -exec sed -i '' 's/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY"/codesign --force --sign "-" /g' {} + 2>/dev/null || true

      - name: Build iOS App (Ad-Hoc Signed)
        run: |
          cd ios
          xcodebuild -workspace SubTrack.xcworkspace \
            -scheme SubTrack \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            EXPANDED_CODE_SIGN_IDENTITY="-" \
            EXPANDED_CODE_SIGN_IDENTITY_NAME="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Create IPA
        run: |
          cd ios
          APP_PATH="build/Build/Products/Release-iphoneos/SubTrack.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::SubTrack.app was not found in $APP_PATH!"
            find build -name "*.app" 2>/dev/null || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qq -r -9 SubTrack.ipa Payload
          mv SubTrack.ipa ${{ github.workspace }}/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubTrack-iOS-IPA-Unsigned
          path: SubTrack.ipa
          compression-level: 0
          retention-days: 14

      - name: Create Release and Upload IPA
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ios-v${{ github.run_number }}
          name: iOS Build v${{ github.run_number }} (Unsigned)
          target_commitish: ${{ github.sha }}
          body: |
            iOS IPA Build - Unsigned (No Code Signing Required)
            
            ⚠️ This IPA is ad-hoc signed (`-`) and can be installed via Sideloadly, AltStore, Scarlet, TrollStore, or Esign.
            Built automatically without any Apple Developer Account.
            
            **Build Details:**
            - Build Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          files: SubTrack.ipa
