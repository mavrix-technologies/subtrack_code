name: iOS IPA Build (Unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build (No Code Signing)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile and Xcode Project for Unsigned Build
        run: |
          node -e '
          const fs = require("fs");
          
          // 1. Patch Podfile
          const podfile = "ios/Podfile";
          if (fs.existsSync(podfile)) {
            let content = fs.readFileSync(podfile, "utf8");
            const patch = `
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"
                config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"
                config.build_settings["CODE_SIGN_IDENTITY"] = ""
                config.build_settings["EXPANDED_CODE_SIGN_IDENTITY"] = ""
                config.build_settings["DEVELOPMENT_TEAM"] = ""
                config.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ""
              end
            end
            `;
            if (content.includes("post_install do |installer|")) {
              content = content.replace("post_install do |installer|", "post_install do |installer|\n" + patch);
            } else {
              content += "\npost_install do |installer|\n" + patch + "\nend\n";
            }
            fs.writeFileSync(podfile, content);
            console.log("Successfully patched ios/Podfile");
          }

          // 2. Patch Xcode Project
          const pbxproj = "ios/SubTrack.xcodeproj/project.pbxproj";
          if (fs.existsSync(pbxproj)) {
            let content = fs.readFileSync(pbxproj, "utf8");
            content = content.replace(/CODE_SIGN_STYLE = Automatic;/g, "CODE_SIGN_STYLE = Manual;");
            content = content.replace(/CODE_SIGN_IDENTITY = "([^"]*)";/g, "CODE_SIGN_IDENTITY = \"\";");
            content = content.replace(/DEVELOPMENT_TEAM = [^;]*;/g, "DEVELOPMENT_TEAM = \"\";");
            content = content.replace(/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/g, "PROVISIONING_PROFILE_SPECIFIER = \"\";");
            fs.writeFileSync(pbxproj, content);
            console.log("Successfully patched ios/SubTrack.xcodeproj/project.pbxproj");
          }
          '

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build iOS Archive (Unsigned)
        run: |
          cd ios
          xcodebuild archive \
            -workspace SubTrack.xcworkspace \
            -scheme SubTrack \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/SubTrack.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create IPA
        run: |
          cd ios
          ARCHIVE_APP="build/SubTrack.xcarchive/Products/Applications/SubTrack.app"
          if [ ! -d "$ARCHIVE_APP" ]; then
            echo "::error::SubTrack.app was not found in $ARCHIVE_APP!"
            ls -la build/SubTrack.xcarchive/Products/Applications/ 2>/dev/null || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$ARCHIVE_APP" Payload/
          zip -qq -r -9 SubTrack.ipa Payload
          mv SubTrack.ipa ${{ github.workspace }}/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubTrack-iOS-IPA-Unsigned
          path: SubTrack.ipa
          compression-level: 0
          retention-days: 14

      - name: Create Release and Upload IPA
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ios-v${{ github.run_number }}
          name: iOS Build v${{ github.run_number }} (Unsigned)
          target_commitish: ${{ github.sha }}
          body: |
            iOS IPA Build - Unsigned (No Code Signing)
            
            ⚠️ This IPA is NOT signed and cannot be installed directly on un-jailbroken devices without Sideloadly/AltStore.
            Built automatically without any Apple Developer Account.
            
            **Build Details:**
            - Build Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          files: SubTrack.ipa
