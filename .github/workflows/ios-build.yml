name: iOS IPA Build (Unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build (No Code Signing)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile for XCode compatibility (if needed)
        run: |
          cd ios
          # Check XCode version
          xcodebuild -version
          # Remove strict XCode version check if present
          if grep -q "React Native requires XCode" Podfile; then
            echo "Patching Podfile to remove XCode version requirement..."
            sed -i.bak '/React Native requires XCode/,/raise.*XCode/d' Podfile
            echo "Podfile patched successfully"
          else
            echo "No XCode version check found in Podfile"
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build iOS app (archive)
        run: |
          set -o pipefail
          cd ios
          xcodebuild archive \
            -workspace SubTrack.xcworkspace \
            -scheme SubTrack \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/SubTrack.xcarchive" \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CLANG_ENABLE_MODULE_DEBUGGING=NO \
            SWIFT_SERIALIZE_DEBUGGING_OPTIONS=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee xcode_build.log || { echo "=================== XCODE BUILD FAILURE LOG ==================="; tail -n 150 xcode_build.log; exit 1; }

      - name: Create IPA
        run: |
          echo "=== Locating .app inside xcarchive ==="
          APP_PATH=$(find ios/build/SubTrack.xcarchive -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ ERROR: No .app found in xcarchive!"
            find ios/build/SubTrack.xcarchive -type d | head -30
            exit 1
          fi

          APP_NAME=$(basename "$APP_PATH")
          echo "✅ Found: $APP_NAME at $APP_PATH"
          echo "=== App bundle contents ==="
          ls -lh "$APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" "Payload/$APP_NAME"

          # Convert Info.plist to XML for cross-platform compatibility (Sideloadly/AltStore)
          plutil -convert xml1 "Payload/$APP_NAME/Info.plist"

          echo "=== Info.plist preview ==="
          plutil -p "Payload/$APP_NAME/Info.plist" | head -n 15

          zip -r -9 SubTrack.ipa Payload
          echo "=== IPA size ==="
          du -sh SubTrack.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubTrack-iOS-IPA-Unsigned
          path: SubTrack.ipa
          compression-level: 0
          retention-days: 14

      - name: Create Release and Upload IPA
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ios-v${{ github.run_number }}
          name: iOS Build v${{ github.run_number }} (Unsigned)
          body: |
            iOS IPA Build - Unsigned (No Code Signing)
            
            ⚠️ This IPA is NOT signed and cannot be installed directly on un-jailbroken devices without Sideloadly/AltStore.
            Built automatically without any Apple Developer Account.
            
            **Build Details:**
            - Build Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          files: SubTrack.ipa
