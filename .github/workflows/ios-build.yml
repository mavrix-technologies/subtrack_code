name: iOS IPA Build (Unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build (No Code Signing)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile for XCode compatibility (if needed)
        run: |
          cd ios
          # Check XCode version
          xcodebuild -version
          # Remove strict XCode version check if present
          if grep -q "React Native requires XCode" Podfile; then
            echo "Patching Podfile to remove XCode version requirement..."
            sed -i.bak '/React Native requires XCode/,/raise.*XCode/d' Podfile
            echo "Podfile patched successfully"
          else
            echo "No XCode version check found in Podfile"
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build iOS app (no codesign)
        run: |
          cd ios
          xcodebuild -workspace SubTrack.xcworkspace \
            -scheme SubTrack \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build 2>&1 | tee xcode_build.log || { echo "=================== XCODE BUILD FAILURE LOG ==================="; tail -n 150 xcode_build.log; exit 1; }

      - name: Create IPA
        run: |
          echo "=== Locating compiled .app bundle containing Info.plist ==="
          
          # Find any .app directory under ios/build that contains an Info.plist file
          INFO_PLIST_FILE=$(find ios/build -name "Info.plist" -path "*.app/Info.plist" | head -n 1)
          
          if [ -z "$INFO_PLIST_FILE" ]; then
            echo "⚠️ No Info.plist found inside *.app folders in ios/build. Searching all Info.plist files:"
            find ios/build -name "Info.plist"
            echo "Searching all .app folders:"
            find ios/build -name "*.app"
            exit 1
          fi

          APP_PATH=$(dirname "$INFO_PLIST_FILE")
          APP_NAME=$(basename "$APP_PATH")
          echo "✅ Found valid iOS App bundle: $APP_NAME at $APP_PATH"
          
          echo "=== Contents of $APP_PATH ==="
          ls -la "$APP_PATH"

          rm -rf Payload SubTrack.ipa
          mkdir -p "Payload/$APP_NAME"
          
          # Dereference ALL internal symlinks completely so extractors (isideload/Sideloadly) get real files
          rsync -avL "$APP_PATH/" "Payload/$APP_NAME/"
          
          # Ensure Info.plist exists and is non-empty
          if [ ! -s "Payload/$APP_NAME/Info.plist" ]; then
            echo "❌ ERROR: Info.plist is missing or empty in Payload/$APP_NAME/Info.plist!"
            exit 1
          fi
          
          # Convert Info.plist to XML format for 100% cross-platform parser compatibility (Rust isideload / Windows)
          plutil -convert xml1 "Payload/$APP_NAME/Info.plist"
          
          echo "=== Verifying Info.plist contents ==="
          plutil -p "Payload/$APP_NAME/Info.plist" | head -n 20
          
          # Zip Payload into SubTrack.ipa
          zip -r -9 SubTrack.ipa Payload
          
          echo "=== Verifying Zip Archive structure ==="
          unzip -l SubTrack.ipa | grep "Payload/.*Info.plist"
          
          mv SubTrack.ipa ${{ github.workspace }}/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubTrack-iOS-IPA-Unsigned
          path: SubTrack.ipa
          compression-level: 0
          retention-days: 14

      - name: Create Release and Upload IPA
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ios-v${{ github.run_number }}
          name: iOS Build v${{ github.run_number }} (Unsigned)
          body: |
            iOS IPA Build - Unsigned (No Code Signing)
            
            ⚠️ This IPA is NOT signed and cannot be installed directly on un-jailbroken devices without Sideloadly/AltStore.
            Built automatically without any Apple Developer Account.
            
            **Build Details:**
            - Build Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          files: SubTrack.ipa
